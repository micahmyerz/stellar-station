<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Station — Living</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070912; --panel:#0e1120; --ink:#e8ecf8; --dim:#8a93b2;
    --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Space Mono",ui-monospace,monospace;
    overflow-x:hidden;
    position:relative;
  }
  /* starfield + atmosphere */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(1px 1px at 20% 30%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 70% 12%, #cfe 50%, transparent 51%),
      radial-gradient(1px 1px at 85% 60%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 40% 80%, #adf 50%, transparent 51%),
      radial-gradient(1px 1px at 55% 45%, #fff 50%, transparent 51%),
      radial-gradient(2px 2px at 12% 70%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 90% 88%, #fff 50%, transparent 51%);
    opacity:.5; animation:twinkle 6s ease-in-out infinite;
  }
  body::after{ /* scanlines + vignette */
    content:"";position:fixed;inset:0;z-index:50;pointer-events:none;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px),
      radial-gradient(120% 90% at 50% 30%, transparent 55%, rgba(0,0,0,.6) 100%);
    mix-blend-mode:multiply; opacity:.5;
  }
  @keyframes twinkle{0%,100%{opacity:.35}50%{opacity:.6}}

  .wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:22px 20px 60px}

  header.top{
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:14px;margin-bottom:22px;
  }
  .title{
    font-family:"Press Start 2P",monospace;font-size:20px;line-height:1.5;
    letter-spacing:1px;display:flex;align-items:center;gap:12px;
    text-shadow:0 0 14px rgba(120,180,255,.45);
  }
  .title .star{color:#ffd34d;animation:spin 6s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}

  .hud{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .stat{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:8px 12px;min-width:78px;text-align:center;
  }
  .stat .k{font-size:9px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase}
  .stat .v{font-family:"Press Start 2P",monospace;font-size:16px;margin-top:5px}
  .stat.active .v{color:#7cff5b;text-shadow:0 0 10px rgba(124,255,91,.6)}

  .conn{
    display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:1px;
    padding:8px 12px;border-radius:999px;border:1px solid var(--line);
    background:var(--panel);
  }
  .conn .dot{width:9px;height:9px;border-radius:50%;background:#ff9d3c;box-shadow:0 0 8px #ff9d3c}
  .conn.live .dot{background:#39e08a;box-shadow:0 0 10px #39e08a;animation:pulse 1.4s ease-in-out infinite}
  .conn.live{color:#bfeedd;border-color:rgba(57,224,138,.4)}
  .conn.demo{color:#ffcf9a;border-color:rgba(255,157,60,.4)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* room grid */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:880px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}

  .room{
    --accent:#5bc8ff;
    position:relative;aspect-ratio:4/3;border-radius:14px;overflow:hidden;
    border:1px solid var(--line);cursor:pointer;
    background:#101529;
    transition:transform .18s ease, box-shadow .3s ease, border-color .3s ease;
    opacity:0;transform:translateY(10px);
    animation:rise .5s ease forwards;
  }
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  .room:hover{transform:translateY(-3px)}
  .room .bg{position:absolute;inset:0;background-size:cover;background-position:center;
    image-rendering:auto;filter:saturate(.9) brightness(.62);transition:filter .3s}
  .room .bgfallback{position:absolute;inset:0;
    background:
      radial-gradient(120% 100% at 50% 0%, color-mix(in srgb,var(--accent) 38%,transparent), transparent 70%),
      linear-gradient(160deg,#141a30,#0b1020);}
  .room .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,9,18,.15) 0%,rgba(6,9,18,.05) 45%,rgba(6,9,18,.85) 100%)}

  .room.working{border-color:color-mix(in srgb,var(--accent) 70%,transparent);
    box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 50%,transparent),
               0 0 34px -4px color-mix(in srgb,var(--accent) 80%,transparent);
    animation:rise .5s ease forwards, roompulse 2s ease-in-out infinite .5s}
  .room.working .bg{filter:saturate(1.1) brightness(.8)}
  @keyframes roompulse{0%,100%{box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 45%,transparent),0 0 26px -6px color-mix(in srgb,var(--accent) 70%,transparent)}
    50%{box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 75%,transparent),0 0 42px -2px color-mix(in srgb,var(--accent) 90%,transparent)}}

  .room .label{position:absolute;top:10px;left:12px;right:12px;z-index:3;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .room .name{font-family:"Press Start 2P",monospace;font-size:10px;letter-spacing:.5px;
    color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9)}
  .room .role{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-top:6px}
  .badge{font-size:8px;letter-spacing:1px;padding:4px 7px;border-radius:6px;
    background:rgba(0,0,0,.5);border:1px solid var(--line);color:var(--dim);white-space:nowrap}
  .room.working .badge{color:#06210f;background:var(--accent);border-color:var(--accent);
    box-shadow:0 0 12px color-mix(in srgb,var(--accent) 70%,transparent);font-weight:700}
  .badge.standby{color:#ffcf9a}

  /* stage where the avatar stands */
  .stage{position:absolute;left:0;right:0;bottom:0;height:58%;z-index:3;display:flex;align-items:flex-end;justify-content:center;padding-bottom:14px}
  .avatar{position:relative;width:54px;height:80px;display:flex;align-items:flex-end;justify-content:center}
  .avatar .shadow{position:absolute;bottom:6px;width:34px;height:9px;border-radius:50%;
    background:radial-gradient(closest-side,rgba(0,0,0,.55),transparent);}
  .avatar .glowring{position:absolute;bottom:4px;width:42px;height:12px;border-radius:50%;
    background:radial-gradient(closest-side,color-mix(in srgb,var(--accent) 85%,transparent),transparent);
    opacity:0;transition:opacity .3s}
  .room.working .avatar .glowring{opacity:.9;animation:ring 1.1s ease-in-out infinite}
  @keyframes ring{0%,100%{transform:scale(.85);opacity:.55}50%{transform:scale(1.15);opacity:.95}}

  .char{width:46px;height:70px;transform-origin:bottom center;animation:idlebob 2.6s ease-in-out infinite}
  .room.working .char{animation:workbob .46s ease-in-out infinite}
  @keyframes idlebob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
  @keyframes workbob{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-3px) scaleY(1.02)}}
  .char rect{shape-rendering:crispEdges}
  .char .arm{transform-box:fill-box;transform-origin:top center}
  .room.working .char .arm-l{animation:typeL .3s ease-in-out infinite alternate}
  .room.working .char .arm-r{animation:typeR .3s ease-in-out infinite alternate}
  @keyframes typeL{from{transform:translateY(0)}to{transform:translateY(2px)}}
  @keyframes typeR{from{transform:translateY(2px)}to{transform:translateY(0)}}
  .char:not(.lit){opacity:.82}
  .room.working .char{opacity:1;filter:drop-shadow(0 0 6px color-mix(in srgb,var(--accent) 60%,transparent))}

  .bubble{position:absolute;top:-2px;left:50%;transform:translateX(-50%);
    font-size:15px;opacity:0;pointer-events:none;filter:drop-shadow(0 0 6px rgba(0,0,0,.6))}
  .room.working .bubble{opacity:1;animation:bub 1.6s ease-in-out infinite}
  @keyframes bub{0%{transform:translate(-50%,4px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translate(-50%,-10px);opacity:0}}

  .hint{margin-top:18px;text-align:center;color:var(--dim);font-size:11px;letter-spacing:.5px}

  /* detail drawer */
  .scrimov{position:fixed;inset:0;background:rgba(3,5,12,.6);backdrop-filter:blur(3px);z-index:80;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrimov.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(420px,92vw);z-index:90;
    background:linear-gradient(180deg,#0c1022,#080a14);border-left:1px solid var(--line);
    transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    padding:24px 22px;overflow-y:auto}
  .drawer.show{transform:translateX(0)}
  .drawer .x{position:absolute;top:16px;right:18px;cursor:pointer;color:var(--dim);font-size:20px;background:none;border:none}
  .drawer h2{font-family:"Press Start 2P",monospace;font-size:14px;margin:6px 0 2px;color:var(--accent,#fff)}
  .drawer .drole{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:18px}
  .drawer .field{margin-bottom:16px}
  .drawer .field .fk{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  .drawer .field .fv{font-size:13px;line-height:1.5}
  .pill{display:inline-block;font-size:10px;letter-spacing:1px;padding:5px 10px;border-radius:6px;border:1px solid var(--line)}
  .pill.work{background:var(--accent);color:#06210f;border-color:var(--accent);font-weight:700}
  .pill.idle{color:var(--dim)}
  .report{background:#0a0e1c;border:1px solid var(--line);border-radius:10px;padding:14px;
    font-size:12px;line-height:1.6;white-space:pre-wrap;color:#cfd6ee;max-height:340px;overflow:auto}
  .report.empty{color:var(--dim);font-style:italic}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="title"><span class="star">★</span> STELLAR STATION</div>
    <div class="hud">
      <div class="stat"><div class="k">Tasks</div><div class="v" id="s-tasks">—</div></div>
      <div class="stat"><div class="k">Done</div><div class="v" id="s-done">—</div></div>
      <div class="stat active"><div class="k">Active</div><div class="v" id="s-active">—</div></div>
      <div class="conn demo" id="conn"><span class="dot"></span><span id="conn-text">CONNECTING…</span></div>
    </div>
  </header>

  <div class="grid" id="grid"></div>
  <div class="hint">Click any station to see what that agent is doing and what it last produced.</div>
</div>

<div class="scrimov" id="ov"></div>
<aside class="drawer" id="drawer">
  <button class="x" id="closeX">✕</button>
  <h2 id="d-name">—</h2>
  <div class="drole" id="d-role">—</div>
  <div class="field"><div class="fk">Status</div><div class="fv"><span class="pill idle" id="d-status">—</span></div></div>
  <div class="field"><div class="fk">Current task</div><div class="fv" id="d-current">—</div></div>
  <div class="field"><div class="fk">Last result produced</div><div class="report empty" id="d-report">No completed tasks yet.</div></div>
</aside>

<script>
  // ─── Config ────────────────────────────────────────────────────────────────
  const API = "http://2.24.126.194:3001/tasks";   // live task queue (CORS open on the API)
  const ASSET_DIR = "/rooms/";                      // where the room art is served on the VPS
  const POLL_MS = 3000;
  const ACTIVE = ["in_progress","assigned","running"];

  const ROOMS = [
    {id:"atlas",   name:"ATLAS",    role:"Manager",     accent:"#5bc8ff", img:"room-atlas.png",   sym:"🧭", agent:true},
    {id:"vega",    name:"VEGA",     role:"Research",    accent:"#46e5a0", img:"room-vega.png",    sym:"🔭", agent:true},
    {id:"nova",    name:"NOVA",     role:"Marketing",   accent:"#ff5bd0", img:"room-nova.png",    sym:"📣", agent:true},
    {id:"pulsar",  name:"PULSAR",   role:"Analytics",   accent:"#7cff5b", img:"room-pulsar.png",  sym:"📊", agent:true},
    {id:"lyra",    name:"LYRA",     role:"Copywriting", accent:"#ffb23e", img:"room-lyra.png",    sym:"✍️", agent:true},
    {id:"warroom", name:"WAR ROOM", role:"Strategy",    accent:"#ff4d6d", img:"room-warroom.png", sym:"⚔️", agent:false},
  ];

  // blocky pixel astronaut, recolored by the room accent
  function charSVG(){
    return `<svg class="char" viewBox="0 0 16 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="5" y="20" width="2" height="4" fill="#222a40"/><rect x="9" y="20" width="2" height="4" fill="#222a40"/>
      <rect x="4" y="10" width="8" height="10" fill="var(--accent)"/>
      <rect x="4" y="10" width="8" height="3" fill="#ffffff" opacity=".18"/>
      <rect class="arm arm-l" x="2" y="11" width="2" height="7" fill="var(--accent)"/>
      <rect class="arm arm-r" x="12" y="11" width="2" height="7" fill="var(--accent)"/>
      <rect x="5" y="3" width="6" height="7" fill="#dfe6f5"/>
      <rect x="6" y="5" width="4" height="3" fill="#0b0f1c"/>
      <rect x="6" y="5" width="4" height="1" fill="var(--accent)"/>
    </svg>`;
  }

  // ─── Render rooms ────────────────────────────────────────────────────────────
  const grid = document.getElementById("grid");
  ROOMS.forEach((r,i)=>{
    const el = document.createElement("div");
    el.className = "room";
    el.style.setProperty("--accent", r.accent);
    el.style.animationDelay = (i*70)+"ms";
    el.dataset.id = r.id;
    el.innerHTML = `
      <div class="bg" data-img="${ASSET_DIR}${r.img}"></div>
      <div class="bgfallback"></div>
      <div class="scrim"></div>
      <div class="label">
        <div><div class="name">${r.name}</div><div class="role">${r.role}</div></div>
        <div class="badge ${r.agent?'':'standby'}">${r.agent?'IDLE':'STANDBY'}</div>
      </div>
      <div class="stage">
        <div class="avatar">
          <div class="bubble">${r.sym}</div>
          <div class="glowring"></div>
          ${charSVG()}
          <div class="shadow"></div>
        </div>
      </div>`;
    el.addEventListener("click",()=>openDrawer(r.id));
    grid.appendChild(el);

    // load room art; if it fails (e.g. preview off the VPS), keep the accent fallback
    const bg = el.querySelector(".bg");
    const test = new Image();
    test.onload = ()=>{ bg.style.backgroundImage = `url('${bg.dataset.img}')`; };
    test.onerror = ()=>{ bg.style.display="none"; };
    test.src = bg.dataset.img;
  });

  // ─── State ─────────────────────────────────────────────────────────────────
  let LATEST = {};   // agentId -> {status, currentType, currentId, lastResult}

  function applyState(tasks, live){
    const total = tasks.length;
    const done = tasks.filter(t=>t.status==="done").length;
    const activeTasks = tasks.filter(t=>ACTIVE.includes(t.status));
    document.getElementById("s-tasks").textContent  = total;
    document.getElementById("s-done").textContent   = done;
    document.getElementById("s-active").textContent = activeTasks.length;

    const conn = document.getElementById("conn");
    conn.className = "conn " + (live?"live":"demo");
    document.getElementById("conn-text").textContent = live ? "LIVE" : "DEMO — not connected";

    const activeSet = new Set(activeTasks.map(t=>(t.assignee||"").toLowerCase()));
    LATEST = {};
    ROOMS.filter(r=>r.agent).forEach(r=>{
      const mine = tasks.filter(t=>(t.assignee||"").toLowerCase()===r.id);
      const cur = mine.find(t=>ACTIVE.includes(t.status));
      const lastDone = mine.filter(t=>t.status==="done")
        .sort((a,b)=>(b.completed_at||"").localeCompare(a.completed_at||""))[0];
      let summary = "";
      if(lastDone && lastDone.result){
        try{ const p = JSON.parse(lastDone.result); summary = p.summary || p.output || JSON.stringify(p,null,2); }
        catch(e){ summary = String(lastDone.result); }
      }
      LATEST[r.id] = {
        working: activeSet.has(r.id),
        currentType: cur ? cur.type : null,
        currentId: cur ? cur.id : null,
        lastResult: summary
      };
      const roomEl = grid.querySelector(`.room[data-id="${r.id}"]`);
      const working = activeSet.has(r.id);
      roomEl.classList.toggle("working", working);
      roomEl.querySelector(".badge").textContent = working ? "WORKING" : "IDLE";
    });
    // keep drawer fresh if open
    if(openId) fillDrawer(openId);
  }

  // ─── Live polling with honest DEMO fallback ──────────────────────────────────
  async function poll(){
    try{
      const res = await fetch(API,{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const tasks = await res.json();
      applyState(Array.isArray(tasks)?tasks:[], true);
      stopDemo();
    }catch(e){
      startDemo();   // can't reach the live queue → clearly-labeled simulation
    }
  }

  // DEMO: obviously-fake sample tasks so the preview animates. Never shown as live.
  let demoTimer=null, demoTasks=null, demoStep=0;
  function startDemo(){
    if(demoTimer) return;
    demoTasks = [
      {id:"D1",assignee:"pulsar",type:"analytics",status:"done",completed_at:"2026-01-01T00:00:02Z",
        result:JSON.stringify({summary:"[DEMO] Sample store-health check — this is placeholder text, not your real data."})},
      {id:"D2",assignee:"lyra",type:"copywriting",status:"done",completed_at:"2026-01-01T00:00:01Z",
        result:JSON.stringify({summary:"[DEMO] Sample review-request email draft."})},
    ];
    const cycle=["lyra","nova","vega","pulsar","atlas"];
    const tick=()=>{
      const who=cycle[demoStep%cycle.length]; demoStep++;
      const t={id:"D"+(100+demoStep),assignee:who,type:"task",status:"in_progress"};
      demoTasks=demoTasks.filter(x=>x.status!=="in_progress").concat([t]);
      applyState(demoTasks,false);
      setTimeout(()=>{
        t.status="done"; t.completed_at=new Date().toISOString();
        t.result=JSON.stringify({summary:"[DEMO] "+who+" finished a sample task. Placeholder output."});
        applyState(demoTasks,false);
      },3200);
    };
    tick(); demoTimer=setInterval(tick,5200);
  }
  function stopDemo(){ if(demoTimer){clearInterval(demoTimer);demoTimer=null;} }

  // ─── Drawer ──────────────────────────────────────────────────────────────────
  let openId=null;
  const ov=document.getElementById("ov"), drawer=document.getElementById("drawer");
  function openDrawer(id){ openId=id; ov.classList.add("show"); drawer.classList.add("show"); fillDrawer(id); }
  function closeDrawer(){ openId=null; ov.classList.remove("show"); drawer.classList.remove("show"); }
  ov.addEventListener("click",closeDrawer);
  document.getElementById("closeX").addEventListener("click",closeDrawer);

  function fillDrawer(id){
    const r=ROOMS.find(x=>x.id===id); if(!r) return;
    drawer.style.setProperty("--accent", r.accent);
    document.getElementById("d-name").textContent=r.name;
    document.getElementById("d-role").textContent=r.role;
    const st=document.getElementById("d-status");
    const cur=document.getElementById("d-current");
    const rep=document.getElementById("d-report");
    if(!r.agent){
      st.className="pill idle"; st.textContent="STANDBY";
      cur.textContent="War Room is a strategy view — it isn't assigned tasks.";
      rep.className="report empty"; rep.textContent="—"; return;
    }
    const s=LATEST[r.id]||{};
    if(s.working){ st.className="pill work"; st.textContent="WORKING"; }
    else{ st.className="pill idle"; st.textContent="IDLE"; }
    cur.textContent = s.working ? `#${s.currentId} · ${s.currentType}` : "Nothing running right now.";
    if(s.lastResult){ rep.className="report"; rep.textContent=s.lastResult; }
    else{ rep.className="report empty"; rep.textContent="No completed tasks yet."; }
  }

  // go
  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
